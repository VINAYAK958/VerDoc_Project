{% extends 'base.html' %}
{% block title %}Reset Password | VerDoc{% endblock %}
{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem;">
    <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Reset Password</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary" style="width:100%; margin-top: 1rem;">Send Reset Link</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Reset Password | VerDoc{% endblock %}

{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem;">
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Reset Password</h1>
    <p style="color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem;">
        Enter your registered email address or phone number.
    </p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1.25rem;">
            <label>Email or Phone Number</label>
            <input type="text" name="identifier" placeholder="e.g. user@email.com or 9876543210" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Send OTP</button>
    </form>
    <div style="margin-top: 1rem; text-align: center; font-size: 0.85rem;">
        <a href="{% url 'login' %}" style="color: var(--muted);">← Back to Login</a>
    </div>
</div>
{% endblock %}

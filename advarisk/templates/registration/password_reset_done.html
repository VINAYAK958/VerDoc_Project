{% extends 'base.html' %}
{% block title %}Reset Email Sent | VerDoc{% endblock %}
{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">✉️</div>
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Check Your Inbox</h1>
    <p style="color: var(--muted); font-size: 0.875rem;">
        If that account exists, we've sent a password reset link.<br>
        Check <code>tmp/emails/</code> in development.
    </p>
    <a href="{% url 'login' %}" class="btn-primary" style="margin-top: 1.5rem; display: inline-block;">Back to Login</a>
</div>
{% endblock %}

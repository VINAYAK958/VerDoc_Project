{% extends 'base.html' %}
{% block title %}Password Reset Complete | VerDoc{% endblock %}
{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Password Reset!</h1>
    <p style="color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem;">
        Your password has been set. You may now log in.
    </p>
    <a href="{% url 'login' %}" class="btn-primary">Log In</a>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Verify OTP | VerDoc{% endblock %}

{% block content %}
<div class="glass" style="max-width:420px;margin:4rem auto;padding:2.5rem;text-align:center;">
  <div style="font-size:3rem;margin-bottom:1rem;">🔐</div>
  <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">Verify Your Identity</h1>
  <p style="color:var(--muted);font-size:0.875rem;margin-bottom:2rem;">
    We sent a 6-digit OTP to
    <strong style="color:white;">{{ otp_target }}</strong>.<br>
    Please enter it below to complete your registration.
  </p>

  <form method="post">
    {% csrf_token %}
    <input type="text" name="otp" placeholder="– – – – – –" maxlength="6" inputmode="numeric"
      style="text-align:center;font-size:1.8rem;letter-spacing:0.7rem;margin-bottom:1rem;width:100%;padding:0.65rem;">
    <button type="submit" class="btn-primary" style="width:100%;">Verify &amp; Complete Signup</button>
  </form>

  <div style="margin-top:1rem;font-size:0.8rem;color:var(--muted);">
    Wrong details? <a href="{% url 'signup' %}" style="color:var(--primary);">Go back</a>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Set New Password | VerDoc{% endblock %}

{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem;">
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Set New Password</h1>
    <p style="color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem;">Choose a strong password (min. 8 characters).</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1.25rem;">
            <label>New Password</label>
            <input type="password" name="password1" placeholder="New password" required minlength="8">
        </div>
        <div style="margin-bottom: 1.25rem;">
            <label>Confirm Password</label>
            <input type="password" name="password2" placeholder="Confirm password" required minlength="8">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Set Password</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Verify OTP | VerDoc{% endblock %}

{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Enter OTP</h1>
        Please enter the 6-digit code sent to your registered email or mobile.
    </p>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="6-digit OTP" maxlength="6"
               style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem; margin-bottom: 1rem;">
        <button type="submit" class="btn-primary" style="width: 100%;">Verify OTP</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Set New Password | VerDoc{% endblock %}
{% block content %}
<div class="glass" style="max-width: 420px; margin: 4rem auto; padding: 2.5rem;">
    <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Set New Password</h1>
    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary" style="width:100%; margin-top: 1rem;">Set New Password</button>
    </form>
    {% else %}
    <p style="color: var(--danger);">This link is invalid or has expired. Please request a new one.</p>
    <a href="{% url 'smart_password_reset' %}" class="btn-primary" style="margin-top: 1rem; display: inline-block;">Try Again</a>
    {% endif %}
</div>
{% endblock %}
